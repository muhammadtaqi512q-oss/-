<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Knowledge Hub (GPT-4o)</title>
    <style>
        /* --- Clean & Modern UI --- */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #f1f5f9;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 900px;
            height: 85vh;
            background-color: #1e293b;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        #chat-header {
            padding: 20px;
            border-bottom: 1px solid #334155;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: #1e293b;
            border-radius: 16px 16px 0 0;
        }

        #message-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 25px;
            scrollbar-width: thin;
        }

        .message {
            padding: 12px 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            line-height: 1.6;
            max-width: 85%;
        }

        .user-message {
            background-color: #3b82f6;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }

        .assistant-message {
            background-color: #334155;
            color: #e2e8f0;
            margin-right: auto;
            border-bottom-left-radius: 2px;
            border: 1px solid #475569;
        }

        #input-area {
            display: flex;
            padding: 20px;
            background-color: #1e293b;
            border-top: 1px solid #334155;
            border-radius: 0 0 16px 16px;
        }

        #user-input {
            flex-grow: 1;
            padding: 12px 20px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 25px;
            color: white;
            font-size: 15px;
            resize: none;
            outline: none;
        }

        #send-button {
            background-color: #3b82f6;
            color: white;
            border: none;
            margin-left: 12px;
            border-radius: 50%;
            cursor: pointer;
            width: 48px;
            height: 48px;
            transition: transform 0.2s;
        }

        #send-button:hover { transform: scale(1.05); }
        #send-button:disabled { background-color: #64748b; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-header">CENTRAL AI HUB (GPT-4o)</div>
        <div id="message-area">
            <div class="message assistant-message">
                Hub Active. Ready to process queries and provide searchable data for other agents.
            </div>
        </div>
        <div id="input-area">
            <textarea id="user-input" placeholder="Enter query for retrieval..." rows="1"></textarea>
            <button id="send-button" disabled>➤</button>
        </div>
    </div>

    <script>
        const inputElement = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const messageArea = document.getElementById('message-area');

        const API_KEY = 'sk-ZMvSdD3SyKGb3PQ769B7KKvjLDLKPNHM6do6jb9YBlMai2Qs'; 
        const ENDPOINT = 'https://api.chatanywhere.tech/v1/chat/completions';

        // --- ENHANCED SEARCHABLE SYSTEM PROMPT ---
        const SYSTEM_PROMPT = `
        You are the 'Central Knowledge Hub'. 
        Your purpose is to provide highly structured, factual, and searchable information for other AI agents.
        1. If a query is broad, break it down into searchable sub-points.
        2. Use JSON or Bullet points where possible for data extraction.
        3. Prioritize technical accuracy over conversational flair.
        4. Always cite specific details that an LLM can use to follow up.
        `;

        let history = [{ role: "system", content: SYSTEM_PROMPT }];

        function displayMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}-message`;
            div.innerText = text;
            messageArea.appendChild(div);
            messageArea.scrollTop = messageArea.scrollHeight;
        }

        async function sendMessage() {
            const text = inputElement.value.trim();
            if (!text) return;

            displayMessage('user', text);
            inputElement.value = '';
            sendButton.disabled = true;

            history.push({ role: "user", content: text });

            try {
                const response = await fetch(ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o',
                        messages: history,
                        temperature: 0.3 // Lower temperature for more factual "searchable" results
                    })
                });

                const data = await response.json();
                const aiMsg = data.choices[0].message.content;
                displayMessage('assistant', aiMsg);
                history.push({ role: "assistant", content: aiMsg });

            } catch (e) {
                displayMessage('assistant', "Error: " + e.message);
            } finally {
                sendButton.disabled = false;
            }
        }

        inputElement.addEventListener('input', () => {
            sendButton.disabled = inputElement.value.trim() === '';
        });

        sendButton.addEventListener('click', sendMessage);
    </script>
</body>
</html>
